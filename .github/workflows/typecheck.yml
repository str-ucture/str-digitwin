name: Type Check

on:
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check
        env:
          # Provide stub values so TypeScript can resolve env var types during check
          VITE_MAPBOX_TOKEN: stub
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_ANON_KEY: stub
