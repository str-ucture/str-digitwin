<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="STR Digital Twin — Interactive 3D map showcasing completed projects in Stuttgart, Germany" />
    <meta property="og:title" content="STR Digital Twin" />
    <meta property="og:description" content="Explore our completed architecture, infrastructure, and urban planning projects in Stuttgart." />
    <title>STR Digital Twin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // GitHub Pages SPA routing: decode path redirect from 404.html
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Decode query-string redirect set by 404.html
        var l = window.location;
        if (l.search[1] === 'p' && l.search.indexOf('p=/') === 1) {
          var decoded = l.search.slice(1).split('&').reduce(function (a, b) {
            var kv = b.split('=');
            a[kv[0]] = kv.slice(1).join('=').replace(/~and~/g, '&');
            return a;
          }, {});
          if (decoded.p !== undefined) {
            history.replaceState(
              null,
              null,
              l.pathname.slice(0, -1) + (decoded.p || '') +
                (decoded.q ? '?' + decoded.q : '') + l.hash,
            );
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
