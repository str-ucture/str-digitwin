<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>STR Digital Twin</title>
    <script>
      // GitHub Pages SPA routing fix.
      // When GitHub Pages returns 404 for a deep URL like /project/123,
      // this script encodes the path and redirects to the root index.html,
      // where React Router will decode it and navigate to the correct route.
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?p=/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
